<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK1 Vocab Data Repository</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121214;
            color: #00ff66;
            padding: 30px;
            font-size: 14px;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e1e24;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2e2e38;
        }
        h2 {
            color: #ffffff;
            margin-top: 0;
            border-bottom: 2px solid #2b5cf6;
            padding-bottom: 10px;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #151518;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #23232a;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>HSK1 Dictionary JSON Source</h2>
        <p style="color: #aaa; margin-bottom: 15px;">This file serves as the core static database for the vocabulary flashcards and AI practice scopes.</p>
        
        <pre><code id="json-display"></code></pre>
    </div>

    <script id="vocabData" type="application/json">
    {
      "root": "hsk1",
      "lessons": {
        "lesson 1-1": ["你", "我", "他", "她", "是"],
        "lesson 1-2": ["叫", "名字", "什么", "呢", "吗"],
        "lesson 1-3": ["好", "你好", "谢谢", "不客气", "对不起"],
        "lesson 1-4": ["请", "喂", "再见", "认识", "朋友"],
        "lesson 1-5": ["爸爸", "妈妈", "儿子", "女儿", "家"],
        "lesson 1-6": ["老师", "学生", "同学", "学校", "学习"],
        "lesson 1-7": ["医生", "医院", "工作", "办公室", "先生"],
        "lesson 1-8": ["一", "二", "三", "四", "五"],
        "lesson 1-9": ["六", "七", "八", "九", "十"],
        "lesson 1-10": ["个", "本", "块", "点", "些"],
        "lesson 1-11": ["今天", "明天", "昨天", "上午", "下午"],
        "lesson 1-12": ["中午", "星期", "月", "年", "时候"],
        "lesson 1-13": ["看", "看见", "听", "说", "读"],
        "lesson 1-14": ["写", "来", "去", "回", "坐"],
        "lesson 1-15": ["吃", "喝", "米饭", "水果", "苹果"],
        "lesson 1-16": ["茶", "水", "菜", "饭店", "买"],
        "lesson 1-17": ["衣服", "椅子", "桌子", "杯子", "书"],
        "lesson 1-18": ["电脑", "电视", "电影", "打电话", "出租车"],
        "lesson 1-19": ["北京", "中国", "汉语", "商店", "飞机"],
        "lesson 1-20": ["前面", "后面", "上", "下", "里"],
        "lesson 1-21": ["在", "有", "没有", "没关系", "能"],
        "lesson 1-22": ["会", "想", "喜欢", "高兴", "漂亮"],
        "lesson 1-23": ["大", "小", "多", "多少", "少"],
        "lesson 1-24": ["热", "冷", "天气", "快", "太"],
        "lesson 1-25": ["爱", "狗", "猫", "人", "孩子"],
        "lesson 1-26": ["号", "钱", "分钟", "岁", "字"],
        "lesson 1-27": ["和", "都", "很", "的", "了"],
        "lesson 1-28": ["哪", "哪儿", "这", "那", "怎么"],
        "lesson 1-29": ["怎么样", "为什么", "谁", "几", "做"],
        "lesson 1-30": ["睡觉", "现在", "下雨", "东西", "儿"]
      }
    }
    </script>

    <script>
        // 将JSON美化打印至页面以便直观查阅
        const dataStr = document.getElementById('vocabData').textContent;
        const jsonObj = JSON.parse(dataStr);
        document.getElementById('json-display').textContent = JSON.stringify(jsonObj, null, 2);
    </script>
</body>
</html>
